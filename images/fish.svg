<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- 背景（白で塗りつぶし前の下地） -->
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <!-- 魚の胴体 -->
  <path d="M 60 150
           C 60 90, 140 60, 220 70
           C 280 78, 320 110, 340 150
           C 320 190, 280 222, 220 230
           C 140 240, 60 210, 60 150
           Z"
        fill="white" stroke="black" stroke-width="4" stroke-linejoin="round"/>

  <!-- 尾びれ -->
  <path d="M 340 150
           L 390 100
           L 375 150
           L 390 200
           Z"
        fill="white" stroke="black" stroke-width="4" stroke-linejoin="round"/>

  <!-- 背びれ -->
  <path d="M 150 72
           C 165 40, 210 42, 225 71
           Z"
        fill="white" stroke="black" stroke-width="4" stroke-linejoin="round"/>

  <!-- 腹びれ -->
  <path d="M 150 228
           C 165 258, 205 258, 220 229
           Z"
        fill="white" stroke="black" stroke-width="4" stroke-linejoin="round"/>

  <!-- エラのライン（胴体を頭と体に分ける） -->
  <path d="M 120 82
           C 100 120, 100 180, 120 218"
        fill="none" stroke="black" stroke-width="4" stroke-linecap="round"/>

  <!-- 目 -->
  <circle cx="95" cy="130" r="12" fill="white" stroke="black" stroke-width="4"/>
  <circle cx="95" cy="130" r="4" fill="black"/>

  <!-- ウロコ（丸い区切り。塗り分けの領域テスト用） -->
  <path d="M 180 110 A 30 30 0 0 1 180 170" fill="none" stroke="black" stroke-width="3"/>
  <path d="M 230 110 A 30 30 0 0 1 230 170" fill="none" stroke="black" stroke-width="3"/>
  <path d="M 205 140 A 30 30 0 0 1 205 200" fill="none" stroke="black" stroke-width="3"/>
  <path d="M 255 140 A 30 30 0 0 1 255 200" fill="none" stroke="black" stroke-width="3"/>
</svg>
